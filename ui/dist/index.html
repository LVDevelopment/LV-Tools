<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LV-Tools v2</title>
    <script type="module" crossorigin src="./assets/index-DHzjEVRK.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D8EYEudf.css">
    <script>
      /* Keep game input alive for movement, but pause it while typing in a field
         so keystrokes don't leak into the game. Regenerated on `npm run build`. */
      (function () {
        function editable(el) {
          if (!el) return false;
          var t = el.tagName;
          return t === 'INPUT' || t === 'TEXTAREA' || t === 'SELECT' || el.isContentEditable;
        }
        function send(keep) {
          var res = (typeof GetParentResourceName !== 'undefined') ? GetParentResourceName() : null;
          if (!res) return;
          fetch('https://' + res + '/setKeepInput', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ keep: keep }),
          }).catch(function () {});
        }
        document.addEventListener('focusin', function (e) { if (editable(e.target)) send(false); });
        document.addEventListener('focusout', function (e) { if (editable(e.target)) send(true); });
      })();
    </script>
  </head>
  <body class="bg-transparent">
    <div id="root"></div>
  </body>
</html>
